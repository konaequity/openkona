<!DOCTYPE html>
<html>
<head>
<style>
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
  }

  .container { position: relative; }

  svg { width: 550px; }

  /* All paths start invisible, draw in via stroke */
  .canoe path {
    fill: none;
    stroke: #E8C840;
    stroke-width: 25;
    stroke-dasharray: 10000;
    stroke-dashoffset: 10000;
    opacity: 0;
  }

  /* Main hull+sail shape */
  .canoe path:nth-child(1) {
    animation: draw 2.5s ease-in-out 0.2s forwards, fill-gold 0.8s ease-out 2.2s forwards;
  }
  /* Sail detail */
  .canoe path:nth-child(2) {
    animation: draw 1.5s ease-in-out 0.8s forwards, fill-gold 0.8s ease-out 2.0s forwards;
  }
  /* Left hull detail */
  .canoe path:nth-child(3) {
    animation: draw 1.2s ease-in-out 1.2s forwards, fill-gold 0.6s ease-out 2.2s forwards;
  }
  /* Right hull detail */
  .canoe path:nth-child(4) {
    animation: draw 1.2s ease-in-out 1.4s forwards, fill-gold 0.6s ease-out 2.4s forwards;
  }

  @keyframes draw {
    0% { stroke-dashoffset: 10000; opacity: 1; }
    100% { stroke-dashoffset: 0; opacity: 1; }
  }

  @keyframes fill-gold {
    0% { fill: none; stroke-width: 25; }
    100% { fill: #E8C840; stroke-width: 0; }
  }

  /* After assembly: gentle ocean bob */
  .canoe {
    animation: bob 5s ease-in-out infinite;
    animation-delay: 3s;
  }

  @keyframes bob {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    30% { transform: translateY(-5px) rotate(0.4deg); }
    60% { transform: translateY(2px) rotate(-0.2deg); }
  }

  /* Glow breathing */
  .glow {
    animation: glow-pulse 4s ease-in-out infinite;
    animation-delay: 3s;
  }

  @keyframes glow-pulse {
    0%, 100% { filter: drop-shadow(0 0 5px rgba(232, 200, 64, 0.05)); }
    50% { filter: drop-shadow(0 0 30px rgba(232, 200, 64, 0.25)); }
  }

  /* Water lines */
  .water { position: absolute; bottom: 18%; width: 100%; }
  .water line {
    stroke: rgba(232, 200, 64, 0.12);
    stroke-width: 1;
    stroke-dasharray: 200;
    animation: wave 6s ease-in-out infinite;
    opacity: 0;
  }
  .water line:nth-child(1) { animation-delay: 3.5s; }
  .water line:nth-child(2) { animation-delay: 4.2s; }
  .water line:nth-child(3) { animation-delay: 4.9s; }

  @keyframes wave {
    0% { opacity: 0; stroke-dashoffset: 200; }
    30% { opacity: 0.5; stroke-dashoffset: 0; }
    100% { opacity: 0; stroke-dashoffset: -200; }
  }
</style>
