# KONASH Training Server — SkyPilot Task
#
# Provisions the best available GPU, loads the model, and runs training.
# GPU fallback: H200 → H100 SXM → H100 → A100 80GB (tries best first).
#
# Two modes:
#   1. ROLLOUTS_PATH set: OAPL-only (rollouts generated on client laptop)
#   2. CORPUS_PATH set:   Full pipeline (synthesis + rollouts + OAPL on GPU)

name: konash-train

resources:
  accelerators: ["H200:1", "H100-SXM:1", "H100:1", "A100-80GB:1"]
  disk_size: 200

envs:
  TOGETHER_API_KEY: ""
  HF_TOKEN: ""
  CORPUS_PATH: financebench
  ROLLOUTS_PATH: ""
  ITERATIONS: "1"
  ROLLOUTS_PER_EXAMPLE: "8"
  LEARNING_RATE: "1e-6"
  PUSH_TO_HUB: ""

workdir: .

setup: |
  echo "=== KONASH Training Setup ==="
  pip install -e ".[unsloth,search,data]" 2>&1 | tail -5

  if [ "$CORPUS_PATH" = "financebench" ] && [ -z "$ROLLOUTS_PATH" ]; then
    python -c "from konash.download import download_financebench; download_financebench()"
  fi

  echo "=== Setup complete ==="

run: |
  set -e
  export UNSLOTH_VLLM_STANDBY=1

  echo "=== KONASH Training ==="
  echo "GPU: $(nvidia-smi --query-gpu=name,memory.total --format=csv,noheader)"

  if [ "$CORPUS_PATH" = "financebench" ]; then
    RESOLVED_CORPUS="$HOME/.konash/corpora/financebench/documents"
  else
    RESOLVED_CORPUS="$CORPUS_PATH"
  fi

  if [ -n "$ROLLOUTS_PATH" ]; then
    # Mode 1: OAPL only (client already generated rollouts)
    echo "Mode: OAPL from pre-generated rollouts"
    CMD="python scripts/train_oapl_unsloth.py \
      --rollouts $ROLLOUTS_PATH \
      --lr $LEARNING_RATE \
      --output ./checkpoints"
  else
    # Mode 2: Full pipeline with iterative bootstrapping
    echo "Mode: Full pipeline (synthesis + rollouts + OAPL)"
    CMD="python scripts/train_oapl_unsloth.py \
      --corpus $RESOLVED_CORPUS \
      --iterations $ITERATIONS \
      --rollouts-per-example $ROLLOUTS_PER_EXAMPLE \
      --lr $LEARNING_RATE \
      --output ./checkpoints"
  fi

  if [ -n "$PUSH_TO_HUB" ]; then
    CMD="$CMD --push-to-hub $PUSH_TO_HUB"
  fi

  echo "Running: $CMD"
  eval $CMD

  echo ""
  echo "=== Training complete ==="
  ls -la ./checkpoints/
