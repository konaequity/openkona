name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,search]"

      - name: Check imports
        run: |
          python -c "import konash; print(f'konash {konash.__version__}')"
          python -c "from konash.training.oapl import OAPLTrainer"
          python -c "from konash.synthesis.filters import PassRateFilter"
          python -c "from konash.synthesis.dedup import EmbeddingDeduplicator"
          python -c "from konash.corpus import Corpus"
          python -c "from konash.inference.value_search import ValueGuidedSearchEngine"

      - name: Run tests
        run: pytest -ra --tb=short
