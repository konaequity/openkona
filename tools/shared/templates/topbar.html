<!-- Shared KONASH topbar — included by all four pages.
     Set `active_tab` before including: arena | traces | training | eval
     Override `topbar_right` block for page-specific controls. -->

<style>
/* ── Shared Topbar ──────────────────────────────────────── */
.topbar {
  background: rgba(243, 240, 234, 0.88);
  border-bottom: 1px solid rgba(26, 26, 26, 0.08);
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(14px);
}
.topbar-inner {
  max-width: 1520px;
  margin: 0 auto;
  padding: 12px 28px;
  min-height: 76px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
}
.topbar-left {
  display: flex;
  align-items: center;
  gap: 22px;
  min-width: 0;
}
.topbar-right {
  display: flex;
  align-items: center;
  gap: 10px;
  position: relative;
  flex-shrink: 0;
}
.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  color: #161513;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  flex-shrink: 0;
}
.logo-mark {
  width: 52px;
  height: 36px;
  display: block;
  object-fit: contain;
  object-position: center;
}
.nav-tabs {
  display: flex;
  gap: 8px;
  min-width: 0;
  flex-wrap: wrap;
}
.nav-tab {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 42px;
  padding: 0 16px;
  font-size: 13px;
  font-weight: 700;
  color: #625e58;
  text-decoration: none;
  border: 1px solid transparent;
  border-radius: 999px;
  transition: all 0.16s ease;
  letter-spacing: 0.02em;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  white-space: nowrap;
}
.nav-tab:hover {
  color: #161513;
  background: rgba(255, 255, 255, 0.78);
  border-color: rgba(26, 26, 26, 0.08);
}
.nav-tab.active {
  color: #ffffff;
  background: #161513;
  border-color: #161513;
}
.topbar-btn {
  padding: 10px 14px;
  border-radius: 14px;
  border: 1px solid rgba(26, 26, 26, 0.08);
  background: rgba(255, 255, 255, 0.82);
  color: #444444;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.16s ease;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  display: flex;
  align-items: center;
  gap: 6px;
  font-weight: 600;
  box-shadow: 0 1px 2px rgba(15, 15, 15, 0.04);
}
.topbar-btn:hover {
  border-color: rgba(26, 26, 26, 0.14);
  color: #000000;
  background: #ffffff;
  transform: translateY(-1px);
  box-shadow: 0 10px 24px rgba(18, 17, 14, 0.07);
}

@media (max-width: 900px) {
  .topbar-inner {
    padding: 12px 16px;
    align-items: flex-start;
  }

  .topbar-left {
    flex-direction: column;
    align-items: flex-start;
    gap: 12px;
  }

  .topbar-right {
    width: 100%;
    justify-content: flex-end;
  }
}
</style>

<div class="topbar">
<div class="topbar-inner">
  <div class="topbar-left">
    <div class="logo">
      <img class="logo-mark" src="/assets/logo.svg" alt="Konash boat logo">
      KONASH
    </div>
    <div class="nav-tabs">
      <a href="/arena/" class="nav-tab{{ ' active' if active_tab == 'arena' else '' }}">Arena</a>
      <a href="/traces/" class="nav-tab{{ ' active' if active_tab == 'traces' else '' }}">Traces</a>
      <a href="/training/" class="nav-tab{{ ' active' if active_tab == 'training' else '' }}">Training</a>
      <a href="/eval/" class="nav-tab{{ ' active' if active_tab == 'eval' else '' }}">Eval</a>
    </div>
  </div>
  <div class="topbar-right">
    {{ topbar_right_content | default('') | safe }}
  </div>
</div>
</div>
