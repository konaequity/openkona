<!-- Shared KONASH topbar — included by all four pages.
     Set `active_tab` before including: arena | traces | training | eval
     Override `topbar_right` block for page-specific controls. -->

<style>
/* ── Shared Topbar ──────────────────────────────────────── */
.topbar {
  background: rgba(243, 240, 234, 0.88);
  border-bottom: 1px solid rgba(26, 26, 26, 0.08);
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(14px);
}
.topbar-inner {
  max-width: 1520px;
  margin: 0 auto;
  padding: 12px 28px;
  min-height: 76px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
}
.topbar-left {
  display: flex;
  align-items: center;
  gap: 22px;
  min-width: 0;
}
.topbar-right {
  display: flex;
  align-items: center;
  gap: 10px;
  position: relative;
  flex-shrink: 0;
}
.topbar-status-group {
  position: relative;
}
.topbar-instance-pill {
  padding: 10px 14px;
  border-radius: 999px;
  border: 1px solid rgba(26, 26, 26, 0.08);
  background: rgba(255, 255, 255, 0.82);
  color: #444444;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.16s ease;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-weight: 600;
  box-shadow: 0 1px 2px rgba(15, 15, 15, 0.04);
}
.topbar-instance-pill:hover {
  border-color: rgba(26, 26, 26, 0.14);
  color: #000000;
  background: #ffffff;
  transform: translateY(-1px);
  box-shadow: 0 10px 24px rgba(18, 17, 14, 0.07);
}
.topbar-instance-pill[data-state="active"] {
  border-color: rgba(28, 122, 69, 0.16);
  background: rgba(244, 252, 247, 0.95);
  color: #155c35;
}
.topbar-instance-pill[data-state="warning"] {
  border-color: rgba(185, 119, 13, 0.16);
  background: rgba(255, 249, 239, 0.95);
  color: #8b5a0a;
}
.topbar-instance-pill[data-state="error"] {
  border-color: rgba(177, 54, 39, 0.16);
  background: rgba(255, 244, 241, 0.95);
  color: #8d2f23;
}
.instance-dot {
  width: 9px;
  height: 9px;
  border-radius: 999px;
  flex-shrink: 0;
  background: #b2aba2;
}
.topbar-instance-pill[data-state="active"] .instance-dot {
  background: #1c7a45;
}
.topbar-instance-pill[data-state="warning"] .instance-dot {
  background: #b9770d;
}
.topbar-instance-pill[data-state="error"] .instance-dot {
  background: #b13627;
}
.instance-panel {
  position: absolute;
  right: 0;
  top: calc(100% + 10px);
  min-width: 340px;
  max-width: 420px;
  padding: 14px;
  border-radius: 18px;
  border: 1px solid rgba(26, 26, 26, 0.08);
  background: rgba(255, 255, 255, 0.98);
  box-shadow: 0 20px 48px rgba(18, 17, 14, 0.14);
  display: none;
}
.topbar-status-group.open .instance-panel {
  display: block;
}
.instance-panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 10px;
}
.instance-panel-title {
  font-size: 13px;
  font-weight: 700;
  color: #161513;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.instance-panel-meta {
  font-size: 12px;
  color: #7b746b;
}
.instance-empty,
.instance-error {
  padding: 10px 0 4px;
  font-size: 13px;
  line-height: 1.5;
  color: #6a645d;
}
.instance-error {
  color: #8d2f23;
}
.instance-list {
  display: grid;
  gap: 10px;
}
.instance-card {
  padding: 12px;
  border-radius: 14px;
  border: 1px solid rgba(26, 26, 26, 0.08);
  background: #faf8f3;
}
.instance-card-top {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 6px;
}
.instance-name {
  font-size: 13px;
  font-weight: 700;
  color: #161513;
}
.instance-status {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: #1c7a45;
}
.instance-card[data-status="pending"] .instance-status,
.instance-card[data-status="creating"] .instance-status,
.instance-card[data-status="provisioning"] .instance-status,
.instance-card[data-status="starting"] .instance-status,
.instance-card[data-status="stopping"] .instance-status {
  color: #8b5a0a;
}
.instance-facts {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 12px;
  font-size: 12px;
  color: #655f58;
}
.instance-fact strong {
  color: #1f1d1a;
}
.instance-local-note {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid rgba(26, 26, 26, 0.06);
  font-size: 12px;
  color: #7b746b;
}
.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  color: #161513;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  flex-shrink: 0;
}
.logo-mark {
  width: 52px;
  height: 36px;
  display: block;
  object-fit: contain;
  object-position: center;
}
.nav-tabs {
  display: flex;
  gap: 8px;
  min-width: 0;
  flex-wrap: wrap;
}
.nav-tab {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 42px;
  padding: 0 16px;
  font-size: 13px;
  font-weight: 700;
  color: #625e58;
  text-decoration: none;
  border: 1px solid transparent;
  border-radius: 999px;
  transition: all 0.16s ease;
  letter-spacing: 0.02em;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  white-space: nowrap;
}
.nav-tab:hover {
  color: #161513;
  background: rgba(255, 255, 255, 0.78);
  border-color: rgba(26, 26, 26, 0.08);
}
.nav-tab.active {
  color: #ffffff;
  background: #161513;
  border-color: #161513;
}
.topbar-btn {
  padding: 10px 14px;
  border-radius: 14px;
  border: 1px solid rgba(26, 26, 26, 0.08);
  background: rgba(255, 255, 255, 0.82);
  color: #444444;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.16s ease;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  display: flex;
  align-items: center;
  gap: 6px;
  font-weight: 600;
  box-shadow: 0 1px 2px rgba(15, 15, 15, 0.04);
}
.topbar-btn:hover {
  border-color: rgba(26, 26, 26, 0.14);
  color: #000000;
  background: #ffffff;
  transform: translateY(-1px);
  box-shadow: 0 10px 24px rgba(18, 17, 14, 0.07);
}

@media (max-width: 900px) {
  .topbar-inner {
    padding: 12px 16px;
    align-items: flex-start;
  }

  .topbar-left {
    flex-direction: column;
    align-items: flex-start;
    gap: 12px;
  }

  .topbar-right {
    width: 100%;
    justify-content: flex-end;
  }

  .instance-panel {
    right: auto;
    left: 0;
    min-width: min(340px, calc(100vw - 32px));
  }
}
</style>

<div class="topbar">
<div class="topbar-inner">
  <div class="topbar-left">
    <div class="logo">
      <img class="logo-mark" src="/assets/logo.svg" alt="Konash boat logo">
      KONASH
    </div>
    <div class="nav-tabs">
      <a href="/arena/" class="nav-tab{{ ' active' if active_tab == 'arena' else '' }}">Arena</a>
      <a href="/traces/" class="nav-tab{{ ' active' if active_tab == 'traces' else '' }}">Traces</a>
      <a href="/training/" class="nav-tab{{ ' active' if active_tab == 'training' else '' }}">Training</a>
      <a href="/eval/" class="nav-tab{{ ' active' if active_tab == 'eval' else '' }}">Eval</a>
    </div>
  </div>
  <div class="topbar-right">
    <div class="topbar-status-group" id="shadeform-status-group">
      <button
        type="button"
        class="topbar-instance-pill"
        id="shadeform-status-pill"
        data-state="idle"
        aria-expanded="false"
        aria-controls="shadeform-instance-panel"
      >
        <span class="instance-dot"></span>
        <span id="shadeform-status-text">Checking GPUs...</span>
      </button>
      <div class="instance-panel" id="shadeform-instance-panel">
        <div class="instance-panel-header">
          <div class="instance-panel-title">Shadeform Instances</div>
          <div class="instance-panel-meta" id="shadeform-status-meta">Checking...</div>
        </div>
        <div id="shadeform-status-body" class="instance-empty">Checking current Shadeform state...</div>
      </div>
    </div>
    {{ topbar_right_content | default('') | safe }}
  </div>
</div>
</div>

<script>
(function () {
  const group = document.getElementById('shadeform-status-group');
  const pill = document.getElementById('shadeform-status-pill');
  const text = document.getElementById('shadeform-status-text');
  const meta = document.getElementById('shadeform-status-meta');
  const body = document.getElementById('shadeform-status-body');
  if (!group || !pill || !text || !meta || !body) return;

  function escapeHtml(value) {
    return String(value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function setState(state, label, metaText, html) {
    pill.dataset.state = state;
    text.textContent = label;
    meta.textContent = metaText;
    body.innerHTML = html;
  }

  function renderInstances(payload) {
    if (!payload.configured) {
      setState(
        'idle',
        'Shadeform not configured',
        'No API key',
        '<div class="instance-empty">Add a Shadeform API key in KONASH setup to surface running cloud GPUs here.</div>'
      );
      return;
    }
    if (payload.error) {
      setState(
        'error',
        'Shadeform check failed',
        'API error',
        `<div class="instance-error">${escapeHtml(payload.error)}</div>`
      );
      return;
    }

    const instances = Array.isArray(payload.instances) ? payload.instances : [];
    const count = Number(payload.running_count || 0);
    if (!instances.length) {
      const local = payload.local_instance;
      const localNote = local && local.instance_id
        ? `<div class="instance-local-note">Local KONASH state still references <strong>${escapeHtml(local.instance_id)}</strong>. The remote API did not report a live instance, so the saved state may be stale.</div>`
        : '';
      setState(
        'idle',
        'No GPUs live',
        '0 running',
        `<div class="instance-empty">No active Shadeform instances were found for this account.</div>${localNote}`
      );
      return;
    }

    const cards = instances.map((inst) => {
      const gpuLabel = [inst.num_gpus ? `${inst.num_gpus}x` : '', inst.gpu_type || 'GPU'].join(' ').trim();
      const price = typeof inst.hourly_usd === 'number' ? `$${inst.hourly_usd.toFixed(2)}/hr` : '';
      return `
        <div class="instance-card" data-status="${escapeHtml(inst.status || 'unknown')}">
          <div class="instance-card-top">
            <div class="instance-name">${escapeHtml(inst.name || inst.id || 'Unnamed instance')}</div>
            <div class="instance-status">${escapeHtml(inst.status || 'unknown')}</div>
          </div>
          <div class="instance-facts">
            <span class="instance-fact"><strong>${escapeHtml(gpuLabel)}</strong></span>
            <span class="instance-fact">${escapeHtml(inst.cloud || 'Unknown cloud')}</span>
            <span class="instance-fact">${escapeHtml(inst.region || 'Unknown region')}</span>
            ${price ? `<span class="instance-fact">${escapeHtml(price)}</span>` : ''}
          </div>
        </div>
      `;
    }).join('');

    const local = payload.local_instance;
    const localNote = local && local.instance_id
      ? `<div class="instance-local-note">Tracked locally: <strong>${escapeHtml(local.instance_id)}</strong>${local.ip ? ` · ${escapeHtml(local.ip)}` : ''}</div>`
      : '';
    setState(
      count > 0 ? 'active' : 'warning',
      count === 1 ? '1 GPU live' : `${count} GPUs live`,
      `${instances.length} instance${instances.length === 1 ? '' : 's'} visible`,
      `<div class="instance-list">${cards}</div>${localNote}`
    );
  }

  async function refreshShadeformStatus() {
    try {
      const response = await fetch('/api/shadeform/status', { cache: 'no-store' });
      const payload = await response.json();
      renderInstances(payload);
    } catch (error) {
      setState(
        'error',
        'Shadeform check failed',
        'Request error',
        `<div class="instance-error">${escapeHtml(error && error.message ? error.message : 'Unable to load Shadeform status.')}</div>`
      );
    }
  }

  pill.addEventListener('click', function () {
    const open = group.classList.toggle('open');
    pill.setAttribute('aria-expanded', open ? 'true' : 'false');
  });

  document.addEventListener('click', function (event) {
    if (!group.contains(event.target)) {
      group.classList.remove('open');
      pill.setAttribute('aria-expanded', 'false');
    }
  });

  refreshShadeformStatus();
  window.setInterval(refreshShadeformStatus, 30000);
})();
</script>
